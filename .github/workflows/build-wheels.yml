name: Tests

on:
  push:
    branches:
      - master
      - fix/libomp-install-cmake
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  pull_request:
    paths:
      - pyproject.toml
      - .github/workflows/build-wheels.yml
      - .github/workflows/ci.yml
  workflow_dispatch:

jobs:
  tests:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-2019, macos-13]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.12'

      - name: Install Python packages
        run: |
          python3 -m pip install --extra-index-url https://test.pypi.org/simple energyflow==1.3.3a0
          python3 -m pip install .[test] pytest

      - name: Test package
        run: pytest wasserstein

  builds: 
    name: ${{ matrix.os }} Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2019, macos-13]
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels and upload to PyPI
        run: ./scripts/build-wheels-and-upload.sh
